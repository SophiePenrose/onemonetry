name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (mock-backend tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mock-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mock-backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test:ci

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test

  smoke_e2e:
    name: Smoke (quick e2e)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            mock-backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend dependencies
        run: npm ci --prefix ./mock-backend
      - name: Install frontend dependencies
        run: npm ci --prefix ./frontend
      - name: Run quick smoke
        run: npm run smoke:e2e:quick

  benchmark_delta:
    name: Benchmark Delta (scoring)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mock-backend/package-lock.json
      - name: Install backend dependencies (head)
        run: npm ci --prefix ./mock-backend
      - name: Generate head benchmark
        run: |
          mkdir -p exports
          node ./scripts/scoring-calibration-benchmark.mjs \
            --cases docs/scoring-calibration-cases.bootstrap.json \
            --out exports/scoring-calibration-benchmark-head.json \
            --latest exports/scoring-calibration-benchmark-head-latest.json
      - name: Generate base benchmark
        run: |
          rm -rf /tmp/onemonetry-base
          git worktree add --detach /tmp/onemonetry-base "${{ github.event.pull_request.base.sha }}"
          npm ci --prefix /tmp/onemonetry-base/mock-backend
          node /tmp/onemonetry-base/scripts/scoring-calibration-benchmark.mjs \
            --cases /tmp/onemonetry-base/docs/scoring-calibration-cases.bootstrap.json \
            --out /tmp/onemonetry-base/exports/scoring-calibration-benchmark-base.json \
            --latest /tmp/onemonetry-base/exports/scoring-calibration-benchmark-base-latest.json
          cp /tmp/onemonetry-base/exports/scoring-calibration-benchmark-base.json exports/scoring-calibration-benchmark-base.json
          git worktree remove /tmp/onemonetry-base --force
      - name: Build benchmark delta summary
        run: |
          node ./scripts/scoring-calibration-benchmark-delta.mjs \
            --base exports/scoring-calibration-benchmark-base.json \
            --head exports/scoring-calibration-benchmark-head.json \
            --out exports/scoring-calibration-benchmark-delta.json \
            --markdown exports/scoring-calibration-benchmark-delta.md
          cat exports/scoring-calibration-benchmark-delta.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark delta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scoring-benchmark-delta-${{ github.run_id }}
          path: |
            exports/scoring-calibration-benchmark-base.json
            exports/scoring-calibration-benchmark-head.json
            exports/scoring-calibration-benchmark-delta.json
            exports/scoring-calibration-benchmark-delta.md
      - name: Post benchmark delta comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- scoring-benchmark-delta-comment -->";
            const report = fs.readFileSync("exports/scoring-calibration-benchmark-delta.md", "utf8");
            const body = `${marker}\n${report}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user
              && comment.user.type === "Bot"
              && comment.body
              && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
